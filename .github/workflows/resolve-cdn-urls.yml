name: Resolve CDN URLs

on:
  workflow_dispatch:

jobs:
  resolve:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve CDN URLs
        run: node scripts/resolve-cdn-urls.js

      - name: Commit & push changes
        id: auto-commit
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Update static CDN URLs"

      - name: Trigger CSGO-API update
        if: steps.auto-commit.outputs.changes_detected == 'true'
        run: |
          gh api repos/ByMykel/CSGO-API/dispatches \
            -f event_type=update-images
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
